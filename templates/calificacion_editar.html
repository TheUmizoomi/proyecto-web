{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h5 class="card-title">Editar Calificacion</h5>
        <form method="post" class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Calificacion (0 - 100)</label>
                <input
                    type="number"
                    name="calificacion"
                    class="form-control"
                    min="0"
                    max="100"
                    step="0.01"
                    required
                    value="{{ calificacion.calificacion }}"
                >
            </div>
            <div class="col-12 d-flex gap-2">
                <button class="btn btn-success" type="submit">Guardar</button>
                <a class="btn btn-secondary" href="{{ url_for('calificaciones.calificaciones') }}">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
