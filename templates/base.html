<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Académico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark top-navbar shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand brand-center text-white m-0" href="{{ url_for('home.index') }}">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" class="nav-logo">
                <span class="fw-semibold">Control Académico</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="mainNav">
                <ul class="navbar-nav mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('home.index') }}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('alumnos.alumnos') }}">Alumnos</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('docentes.docentes') }}">Docentes</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('materias.materias') }}">Materias</a></li>
                </ul>
            </div>
        </div>        
    </nav>

    <main class="container px-4 py-4 main-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
